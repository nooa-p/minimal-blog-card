<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/output.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Minimal Blog Card | devChallenges.io</title>
  </head>
  <body class="bg-[#FAFAF9] text-[#20293A]">
    <main
      class="bg-[#FFFFFF] mt-[164px] w-[368px] m-auto p-4 pb-5 rounded-2xl shadow-lg shadow-gray-200"
    >
      <img
        src="images/cactus_img.jpg"
        alt="A Small Cactus"
        class="rounded-xl mb-4"
      />
      <div
        class="inline-block text-[10px] mb-3.5 py-0.5 px-4 bg-[#E6D6FC] text-[#883AE1] rounded-full font-semibold"
      >
        Design
      </div>
      <h1 class="text-lg font-semibold mb-0.5">Embracing Minimalish</h1>
      <p class="font-light text-sm text-[#6C727F] pb-5">
        From minimalist sculptures to minimalist paintings, this blog will
        inspire you to appreciate the beauty that lies in simplicity.
      </p>
      <hr class="w-[368px] -ml-4 bg-[#E5EAF0]" />
      <div class="text-xs text-[#6C727F] pt-5">Annie Spratt</div>
    </main>
  </body>
</html>
